<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Password Checker{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <div class="layout">
    <header class="site-header">
      <div class="logo">Password <span>Checker</span></div>
      <span class="badge" id="api-status-dot">API…</span>
    </header>
    {% block content %}{% endblock %}
    <footer>v{{ version }} · localhost only · legitiem gebruik</footer>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
